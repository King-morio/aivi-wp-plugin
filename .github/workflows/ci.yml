name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
        coverage: none
    
    - name: Install Composer dependencies
      run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader
    
    - name: Run PHP lint
      run: |
        find . -type f -name "*.php" -not -path "./vendor/*" -exec php -l {} \;
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install npm dependencies
      run: npm ci
    
    - name: Run ESLint
      run: |
        npx eslint assets/js/ --ext .js

  test:
    name: Test
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
        coverage: xdebug
    
    - name: Install Composer dependencies
      run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader
    
    - name: Setup WordPress Test Environment
      run: |
        bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true
    
    - name: Run PHPUnit
      run: |
        vendor/bin/phpunit --coverage-clover=coverage.xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup WordPress
      run: |
        curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        chmod +x wp-cli.phar
        sudo mv wp-cli.phar /usr/local/bin/wp
        wp core download --path=/tmp/wordpress
        wp config create --path=/tmp/wordpress --dbname=wp_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --skip-check
        wp core install --path=/tmp/wordpress --url=http://localhost:8080 --title="Test Site" --admin_user=admin --admin_password=password --admin_email=test@example.com
        cp -r . /tmp/wordpress/wp-content/plugins/ai-visibility-inspector
        wp plugin activate ai-visibility-inspector --path=/tmp/wordpress
    
    - name: Start PHP Server
      run: |
        cd /tmp/wordpress
        php -S localhost:8080 &
    
    - name: Test REST Preflight Endpoint
      run: |
        sleep 5
        curl -X POST http://localhost:8080/wp-json/aivi/v1/preflight \
          -H "Content-Type: application/json" \
          -d '{"title":"Test Post","content":"This is test content"}' \
          | jq .
    
    - name: Test REST Ping Endpoint
      run: |
        curl http://localhost:8080/wp-json/aivi/v1/ping | jq .
    
    - name: Verify Plugin Activation
      run: |
        wp plugin status ai-visibility-inspector --path=/tmp/wordpress | grep "Active"
