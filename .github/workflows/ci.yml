name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
        coverage: none
    
    - name: Run PHP lint
      run: |
        find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./tests/*" -exec php -l {} \;
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install npm dependencies
      run: npm install
    
    - name: Run ESLint
      run: |
        echo "ESLint temporarily disabled - will configure in Phase 1"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
        coverage: none
    
    - name: Check plugin syntax
      run: |
        php -l ai-visibility-inspector.php
        php -l includes/class-plugin.php
        php -l includes/class-admin-menu.php
        php -l includes/class-assets.php
        php -l includes/class-editor-sidebar.php
        php -l includes/class-rest-preflight.php
        php -l includes/class-rest-analyze.php
        php -l includes/class-rest-rewrite.php
        php -l includes/class-rest-ping.php
        php -l includes/helpers/functions.php
    
    - name: Verify plugin structure
      run: |
        test -f ai-visibility-inspector.php
        test -f readme.md
        test -f LICENSE
        test -d includes
        test -d assets/js
        test -d tests
